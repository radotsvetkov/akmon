name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          components: rustfmt, clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: >
          RUSTFLAGS='-D warnings'
          cargo test --workspace
          --no-default-features

      - name: Clippy
        run: >
          cargo clippy --workspace
          --no-default-features
          -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  docs-quality:
    name: Docs Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install mdBook
        run: |
          curl -sSL \
            https://github.com/rust-lang/mdBook/releases/download/v0.4.40/mdbook-v0.4.40-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz
          sudo mv mdbook /usr/local/bin/

      - name: mdBook build
        run: mdbook build docs

      - name: Markdown local link checks
        run: python3 scripts/docs/check_markdown_links.py

      - name: CLI snippet smoke checks
        run: bash scripts/docs/check_cli_smoke.sh

      - name: JSON snippet sanity checks
        run: python3 scripts/docs/check_json_snippets.py

      - name: Docs checker fixture tests
        run: bash scripts/docs/test_fixtures.sh

  build-release:
    name: Build release binary
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: akmon-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: akmon-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: akmon-darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.88"
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: >
          cargo build --release
          --no-default-features
          --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: >
            target/${{ matrix.target }}/
            release/akmon
