name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: akmon-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: akmon-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: akmon-darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: >
          cargo build --release
          --no-default-features
          --target ${{ matrix.target }}
          -p akmon-cli

      - name: Stage for upload
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/akmon" "dist/${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten binaries for the release
        run: |
          mkdir -p release-assets
          find dist -type f -name 'akmon-*' -exec cp -v {} release-assets/ \;
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          body: |
            Prebuilt binaries (slim build, `--no-default-features` — no bundled semantic index). See [CHANGELOG.md](https://github.com/radotsvetkov/akmon/blob/main/CHANGELOG.md).

            **Install (macOS / Linux, no sudo):** download the matching asset, `chmod +x`, move to a directory on your `PATH` (e.g. `~/bin`). See the [readme](https://github.com/radotsvetkov/akmon#readme) for details.
