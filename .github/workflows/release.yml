name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: akmon-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: akmon-darwin-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: akmon-darwin-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: >
          cargo build --release
          --no-default-features
          --target ${{ matrix.target }}
          -p akmon-cli
          -p agef-verify

      - name: Stage for upload
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/akmon" "dist/${{ matrix.artifact }}"
          suffix="${{ matrix.artifact }}"
          suffix="${suffix#akmon-}"
          cp "target/${{ matrix.target }}/release/agef-verify" "dist/agef-verify-${suffix}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          # Upload BOTH the akmon and agef-verify binaries staged above (each matrix
          # row's dist/ holds exactly its two binaries). Uploading only the akmon
          # artifact left agef-verify-* missing in the release job, breaking SHA256SUMS.
          path: dist/*

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Flatten binaries for the release
        run: |
          mkdir -p release-assets
          find dist -type f \( -name 'akmon-*' -o -name 'agef-verify-*' \) -exec cp -v {} release-assets/ \;
          ls -la release-assets

      # Software Bill of Materials (CycloneDX) generated from Cargo.lock so
      # downstream consumers can audit the dependency closure of each release.
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          output-file: release-assets/akmon.cdx.json

      # SHA-256 checksums let users verify the integrity of downloaded binaries.
      - name: Generate SHA-256 checksums
        run: |
          cd release-assets
          sha256sum akmon-* agef-verify-* akmon.cdx.json > SHA256SUMS
          cat SHA256SUMS

      - name: Prepare release notes body
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/src/releases/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" RELEASE_NOTES.md
          else
            {
              echo "# ${TAG}"
              echo
              echo "See [CHANGELOG.md](https://github.com/radotsvetkov/akmon/blob/main/CHANGELOG.md) for full details."
            } > RELEASE_NOTES.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          body_path: RELEASE_NOTES.md
