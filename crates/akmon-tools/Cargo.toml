[package]
name = "akmon-tools"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Akmon tool trait and built-in tools (filesystem, …)."

[dependencies]
akmon-core = { path = "../akmon-core" }
async-trait = "0.1"
glob = "0.3"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
walkdir = "2"

[dev-dependencies]
tempfile = "3"
