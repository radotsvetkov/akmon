[book]
title = "Akmon"
description = "The AI coding agent built for developers who take security seriously"
authors = ["Rado Tsvetkov"]
language = "en"
src = "src"

[output.html]
# Use the default mdBook theme so builds work across mdBook 0.4.x and 0.5.x.
# `custom.css` still applies Akmon accent styling.
git-repository-url = "https://github.com/radotsvetkov/akmon"
edit-url-template = "https://github.com/radotsvetkov/akmon/edit/main/docs/src/{path}"
additional-css = ["theme/custom.css"]
no-section-label = false
fold.enable = true
fold.level = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1

[preprocessor.index]
[preprocessor.links]
